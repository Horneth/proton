name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# ADD THIS: Fallback template for PRs without labels
template: |
  * $TITLE (#$NUMBER) @$AUTHOR

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
    template: '- $TITLE (#$NUMBER) @$AUTHOR'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
    template: |
      - **$TITLE** (#$NUMBER) @$AUTHOR
        $BODY
  - title: '🏠 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
    template: '- $TITLE (#$NUMBER) @$AUTHOR'
  - title: '📖 Documentation' # New Category
    labels: [ 'documentation' ]

replacers:
  # Wrapped in single quotes to escape backslashes for the RegEx engine
  - search: '/[\s\S]*## Release Notes\s*([\s\S]*?)(?=\n#|$)/g'
    replace: '> $1'

autolabeler:
  - label: 'documentation'
    files:
      - '*.md'
      - '*.rst'
      - 'docs/**/*'