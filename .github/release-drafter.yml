name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# The validator REQUIRES this exact key at the root
template: |
  # What's Changed
  $CHANGES

# This defines the format for individual lines inside $CHANGES
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
    # Use 'change-template' inside categories if you want to override the line format
    change-template: |
      - **$TITLE** (#$NUMBER) @$AUTHOR
        $BODY
  - title: '📖 Documentation'
    labels:
      - 'documentation'
  - title: '🏠 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'

replacers:
  - search: '/[\s\S]*## Release Notes\s*([\s\S]*?)(?=\n#|$)/g'
    replace: '> $1'

autolabeler:
  - label: 'documentation'
    files:
      - '*.md'
      - '*.rst'
      - 'docs/**/*'