name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Global line format
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

# Category definitions
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
    # Use 'template' here for the specific bug format override
    template: |
      - **$TITLE** (#$NUMBER) @$AUTHOR
        $BODY
  - title: '📖 Documentation'
    labels:
      - 'documentation'
  - title: '🏠 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'

# Clean up the $BODY for the Bug category
replacers:
  - search: '/[\s\S]*## Release Notes\s*([\s\S]*?)(?=\n#|$)/g'
    replace: '> $1'

# Auto-apply documentation label
autolabeler:
  - label: 'documentation'
    files:
      - '*.md'
      - '*.rst'
      - 'docs/**/*'

# Required root template for v5
template: |
  ## What's Changed

  $CHANGES