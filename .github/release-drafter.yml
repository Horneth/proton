name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# This defines the format for EVERY line in the release notes
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

# Fallback if no PRs are found
no-changes-template: 'No changes merged since last release.'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
    # Override the global change-template just for bugs to include the body
    template: |
      - **$TITLE** (#$NUMBER) @$AUTHOR
        $BODY
  - title: '📖 Documentation'
    labels:
      - 'documentation'
  - title: '🏠 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'

replacers:
  - search: '/[\s\S]*## Release Notes\s*([\s\S]*?)(?=\n#|$)/g'
    replace: '> $1'

autolabeler:
  - label: 'documentation'
    files:
      - '*.md'
      - '*.rst'
      - 'docs/**/*'