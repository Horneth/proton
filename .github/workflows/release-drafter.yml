name: Release Drafter

on:
  push:
    branches:
      - main
  # Remove the specific 'types' to let the action handle the default PR events
  pull_request: {}

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          # Explicitly pointing to the config file helps bypass some auto-detection logic
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}